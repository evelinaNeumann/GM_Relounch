<script setup>
import { ref, computed } from "vue";

const searchQuery = ref("");

const services = [
  {
    id: 1,
    icon: "☁️",
    title: "Cloud Server",
    description: "Flexible und skalierbare Cloud-Infrastruktur für Ihre Anwendungen.",
    features: ["99,9% Uptime", "Automatische Backups", "DDoS-Schutz"],
  },
  {
    id: 2,
    icon: "🛠",
    title: "Managed Hosting",
    description: "Vollständig verwaltetes Hosting mit proaktivem Monitoring.",
    features: ["24/7 Support", "Automatische Updates", "Performance-Optimierung"],
  },
  {
    id: 3,
    icon: "🔒",
    title: "Security Services",
    description: "Umfassende Sicherheitslösungen für Ihre IT-Infrastruktur.",
    features: ["Firewall & WAF", "Intrusion Detection", "Security Audits"],
  },
  {
    id: 4,
    icon: "📊",
    title: "Analytics & Monitoring",
    description: "Echtzeit-Überwachung und detaillierte Analysen.",
    features: ["Real-Time Monitoring", "Individuelle Dashboards", "Alerting per Mail & SMS"],
  },
];

const filteredServices = computed(() => {
  const q = searchQuery.value.trim().toLowerCase();
  if (!q) return services;

  return services.filter((s) => {
    const inTitle = s.title.toLowerCase().includes(q);
    const inDesc = s.description.toLowerCase().includes(q);
    const inFeatures = s.features.some((f) => f.toLowerCase().includes(q));
    return inTitle || inDesc || inFeatures;
  });
});
</script>
